name: my_parents_story
description: "Every parent deserves to leave behind their story. Preserve memories forever — completely free, offline, and private."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_tts: ^4.2.2
  speech_to_text: ^7.4.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.6
  share_plus: ^10.1.4
  uuid: ^4.6.0
  pdf: ^3.13.0
  printing: ^5.15.0
  google_fonts: ^6.3.3
  google_generative_ai: ^0.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_test: ^1.0.1

flutter:
  uses-material-design: true
