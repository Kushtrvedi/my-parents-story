name: my_parents_story
description: "Every parent deserves to leave behind their story. Preserve memories forever — completely free, offline, and private."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_tts: ^4.2.2
  speech_to_text: ^7.4.0
  permission_handler: ^11.4.0
  path_provider: ^2.1.6
  share_plus: ^10.1.4
  image_picker: ^1.2.3
  intl: 0.20.2
  uuid: ^4.6.0
  pdf: ^3.13.0
  printing: ^5.15.0
  file_picker: ^8.3.7
  google_fonts: ^6.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
